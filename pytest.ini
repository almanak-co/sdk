[pytest]
addopts = --import-mode=append -vv -n auto
testpaths = almanak/tests tests
pythonpath = almanak
markers =
    chain(name): specify required chain for test (bsc, avax, base, arb)
    morpho: tests specific to Morpho Blue protocol
    asyncio: pytest-asyncio async test marker
    integration: tests that hit live external APIs (LiFi, Polymarket, etc.)
    no_zodiac(reason): opts the test OUT of default Safe+Zodiac execution. Under the opt-out model every intent test in tests/intents/<chain>/ runs through a Safe + Roles Modifier with a late-bound manifest by default; tests that legitimately can't run that way (aggregator routing, EOA-specific failure paths, infra tests bypassing the orchestrator) declare a one-line reason via this marker.
    uses_zodiac(protocols, intent_types, config, ...): legacy opt-in marker — no-op under the opt-out model. Kept registered transiently so stale decorators don't trigger PytestUnknownMarkWarning while they're being removed.
    accounting_e2e: end-to-end accounting tests requiring Anvil (VIB-3415)
    intent(*intent_types): declare which IntentType verbs a test exercises. Required on every test under tests/intents/. Variadic — pass one or more IntentType members. Coupled with the path-attributed chain (tests/intents/<chain>/) and the intent constructor's protocol= kwarg to compute (connector, intent, chain) coverage against ConnectorRegistry. Enforced by scripts/ci/check_intent_coverage.py (static) and tests/intents/conftest.py pytest_collection_modifyitems hook (runtime). See docs/internal/blueprints/10-testing-quality.md §Intent-Coverage Gate. (VIB-4298 / VIB-4303)
filterwarnings =
    ignore::DeprecationWarning:websockets.legacy
