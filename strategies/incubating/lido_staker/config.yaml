# Lido Staker Strategy Configuration
# ===================================
#
# This configuration defines the parameters for the Lido staking strategy.
#
# Configuration Options:
# ----------------------
# min_stake_amount: Minimum ETH balance to trigger staking (default: 0.1 ETH)
# gas_reserve: ETH reserved for gas fees, never staked (default: 0.01 ETH)
# receive_wrapped: Whether to receive wstETH (true) or stETH (false)
# force_action: Force a specific action for testing ("stake" or "")

# Minimum ETH balance required to trigger staking
# Set this based on gas costs - staking ~0.1 ETH is usually worth the gas
min_stake_amount: "0.1"

# ETH reserved for gas fees (never staked)
# Prevents staking the entire balance and leaving no ETH for future transactions
gas_reserve: "0.05"

# Whether to receive wstETH (wrapped, non-rebasing) instead of stETH
# - true: Receive wstETH (recommended for DeFi composability)
# - false: Receive stETH (rebasing, balance increases daily)
receive_wrapped: false

# Force action for testing (leave empty for normal operation)
# Options: "stake", ""
force_action: ""
