}

// =============================================================================
// EnsoService - Enso Finance routing API proxy
// =============================================================================

service EnsoService {
  // Get swap route across multiple DEXs
  rpc GetRoute(EnsoRouteRequest) returns (EnsoRouteResponse);

  // Get quote without building transaction
  rpc GetQuote(EnsoQuoteRequest) returns (EnsoQuoteResponse);

  // Get approval transaction data
  rpc GetApproval(EnsoApprovalRequest) returns (EnsoApprovalResponse);

  // Get bundle transaction for multiple DeFi operations
  rpc GetBundle(EnsoBundleRequest) returns (EnsoBundleResponse);
}

// =============================================================================
// Enso Route Messages
// =============================================================================

message EnsoRouteRequest {
  string chain = 1;                   // Chain name (e.g., "arbitrum", "base")
  string token_in = 2;                // Input token address
  string token_out = 3;               // Output token address
  string amount_in = 4;               // Input amount in wei
  string from_address = 5;            // Sender address
  string receiver = 6;                // Receiver address (optional, defaults to from_address)
  int32 slippage_bps = 7;             // Slippage in basis points (default 50)
  string routing_strategy = 8;        // "router" or "delegate" (optional)
  int32 max_price_impact_bps = 9;     // Max price impact threshold (optional)
  int32 destination_chain_id = 10;    // Destination chain ID for cross-chain (optional)
  string refund_receiver = 11;        // Refund receiver for cross-chain (optional)
}

message EnsoRouteResponse {
  bool success = 1;
  string error = 2;

  // Transaction data
  string to = 3;                      // Router contract address
  string data = 4;                    // Transaction calldata
  string value = 5;                   // ETH value (for native token swaps)
  string gas = 6;                     // Estimated gas

  // Route details
  string amount_out = 7;              // Expected output amount in wei
  int32 price_impact = 8;             // Price impact in basis points
  string gas_estimate = 9;            // Gas estimate in wei

  // Cross-chain fields
  string bridge_fee = 10;             // Bridge fee (for cross-chain)
  int32 estimated_time = 11;          // Estimated time in seconds (for cross-chain)
  bool is_cross_chain = 12;           // Whether this is a cross-chain route

  // Route path info (JSON encoded)
  string route_json = 13;             // Full route details as JSON
}

// =============================================================================
// Enso Quote Messages
// =============================================================================

message EnsoQuoteRequest {
  string chain = 1;
  string token_in = 2;
  string token_out = 3;
  string amount_in = 4;
  string from_address = 5;
  string routing_strategy = 6;
  int32 destination_chain_id = 7;     // For cross-chain quotes
}

message EnsoQuoteResponse {
  bool success = 1;
  string error = 2;
  string amount_out = 3;              // Expected output amount in wei
  int32 price_impact = 4;             // Price impact in basis points
  string gas_estimate = 5;            // Gas estimate
}

// =============================================================================
// Enso Approval Messages
// =============================================================================

message EnsoApprovalRequest {
  string chain = 1;
  string token_address = 2;           // Token to approve
  string amount = 3;                  // Amount to approve (empty for unlimited)
  string from_address = 4;
  string routing_strategy = 5;
}

message EnsoApprovalResponse {
  bool success = 1;
  string error = 2;
  string to = 3;                      // Token contract address
  string data = 4;                    // Approval calldata
  string gas = 5;                     // Estimated gas
}

// =============================================================================
// Enso Bundle Messages
// =============================================================================

message EnsoBundleAction {
  string protocol = 1;                // Protocol name (e.g., "aave-v3", "uniswap-v3")
  string action = 2;                  // Action type (e.g., "deposit", "borrow", "swap")
  map<string, string> args = 3;       // Action arguments
}

message EnsoBundleRequest {
  string chain = 1;
  string from_address = 2;
  repeated EnsoBundleAction actions = 3;
  string routing_strategy = 4;
  bool skip_quote = 5;
}

message EnsoBundleResponse {
  bool success = 1;
  string error = 2;
  string to = 3;                      // Router contract address
  string data = 4;                    // Bundle calldata
  string value = 5;                   // ETH value
  string gas = 6;                     // Estimated gas
  string bundle_json = 7;             // Full bundle response as JSON
}

// =============================================================================
// TokenService - unified token resolution and on-chain metadata discovery
// =============================================================================

service TokenService {
  // Resolve a token by symbol or address, returning cached or static registry data.
  // Checks: memory cache -> disk cache -> static registry -> on-chain (if address)
  rpc ResolveToken(ResolveTokenRequest) returns (TokenMetadataResponse);

  // Get on-chain ERC-20 metadata by querying the token contract directly.
  // Use this for unknown tokens not in the static registry.
  rpc GetTokenMetadata(GetTokenMetadataRequest) returns (TokenMetadataResponse);

  // Get only the decimals for a token (lightweight endpoint).
  // Useful when you only need decimals for amount calculations.
  rpc GetTokenDecimals(GetTokenDecimalsRequest) returns (GetTokenDecimalsResponse);

  // Resolve multiple tokens in a single call (batch operation).
  // Returns metadata for each token, with errors for individual failures.
  rpc BatchResolveTokens(BatchResolveTokensRequest) returns (BatchResolveTokensResponse);
}

// =============================================================================
// TokenService Messages
// =============================================================================

message ResolveTokenRequest {
  string token = 1;           // Token symbol (e.g., "USDC") or address (e.g., "0x...")
  string chain = 2;           // Chain name (e.g., "arbitrum", "base", "ethereum")
}

message GetTokenMetadataRequest {
  string address = 1;         // Token contract address (must be valid 0x address)
  string chain = 2;           // Chain name
}

message GetTokenDecimalsRequest {
  string token = 1;           // Token symbol or address
  string chain = 2;           // Chain name
}

message GetTokenDecimalsResponse {
  bool success = 1;
  int32 decimals = 2;         // Token decimals (e.g., 6 for USDC, 18 for WETH)
  string error = 3;           // Error message if resolution failed
}

message BatchResolveTokensRequest {
  repeated string tokens = 1; // List of token symbols or addresses
  string chain = 2;           // Chain name (all tokens must be on same chain)
}

message BatchResolveTokensResponse {
  bool success = 1;           // True if all tokens resolved successfully
  repeated TokenMetadataResponse tokens = 2;  // Metadata for each token (in order)
  string error = 3;           // Overall error message if batch failed
}

message TokenMetadataResponse {
  bool success = 1;
  string error = 2;           // Error message if resolution failed

  // Token metadata
  string symbol = 3;          // Token symbol (e.g., "USDC", "WETH")
  string address = 4;         // Token contract address (checksummed)
  int32 decimals = 5;         // Token decimals
  string name = 6;            // Token name (e.g., "USD Coin", "Wrapped Ether")
  bool is_verified = 7;       // True if from static registry, false if on-chain lookup
  string source = 8;          // Resolution source: "cache", "static", "on_chain"
}

// =============================================================================
// LifecycleService - agent state and command management (V2 deployment)
// =============================================================================

service LifecycleService {
  // Write agent state (INITIALIZING, RUNNING, PAUSED, ERROR, STOPPING, TERMINATED).
  rpc WriteState(WriteAgentStateRequest) returns (WriteAgentStateResponse);

  // Read current agent state.
  rpc ReadState(ReadAgentStateRequest) returns (ReadAgentStateResponse);

  // Send heartbeat (updates last_heartbeat_at and increments iteration_count).
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // Read the most recent unprocessed command for an agent.
  rpc ReadCommand(ReadAgentCommandRequest) returns (ReadAgentCommandResponse);

  // Acknowledge (mark processed) a command.
  rpc AckCommand(AckAgentCommandRequest) returns (AckAgentCommandResponse);

  // Write a command to an agent (PAUSE, RESUME, STOP).
  rpc WriteCommand(WriteAgentCommandRequest) returns (WriteAgentCommandResponse);
}

// --- LifecycleService Messages ---

message WriteAgentStateRequest {
  string agent_id = 1;
  string state = 2;             // INITIALIZING, RUNNING, PAUSED, ERROR, STOPPING, TERMINATED
  string error_message = 3;     // Optional: error details when state=ERROR
}

message WriteAgentStateResponse {
  bool success = 1;
  string error = 2;
}

message ReadAgentStateRequest {
  string agent_id = 1;
}

message ReadAgentStateResponse {
  bool found = 1;
  string agent_id = 2;
  string state = 3;
  string state_changed_at = 4;  // ISO 8601
  string last_heartbeat_at = 5; // ISO 8601
  string error_message = 6;
  int64 iteration_count = 7;
}

message HeartbeatRequest {
  string agent_id = 1;
}

message HeartbeatResponse {
  bool success = 1;
  string error = 2;
}

message ReadAgentCommandRequest {
  string agent_id = 1;
}

message ReadAgentCommandResponse {
  bool found = 1;
  int64 command_id = 2;
  string agent_id = 3;
  string command = 4;           // PAUSE, RESUME, STOP
  string issued_at = 5;         // ISO 8601
  string issued_by = 6;
}

message AckAgentCommandRequest {
  int64 command_id = 1;
}

message AckAgentCommandResponse {
  bool success = 1;
  string error = 2;
}

message WriteAgentCommandRequest {
  string agent_id = 1;
  string command = 2;           // PAUSE, RESUME, STOP
  string issued_by = 3;
}

message WriteAgentCommandResponse {
  bool success = 1;
  string error = 2;
}
