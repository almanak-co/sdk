// =============================================================================
// Polymarket Order Messages
// =============================================================================

message PolymarketCreateOrderRequest {
  string token_id = 1;        // Token ID for the outcome
  string price = 2;           // Limit price as decimal string
  string size = 3;            // Order size as decimal string
  string side = 4;            // "BUY" or "SELL"
  string fee_rate_bps = 5;    // Fee rate in basis points (optional, default "0")
  int64 expiration = 6;       // Order expiration timestamp (optional, 0 for no expiration)
  string nonce = 7;           // Optional nonce (auto-generated if empty)
  string time_in_force = 8;   // "GTC", "FOK", "GTD" (optional, default "GTC")
}

message PolymarketMarketOrderRequest {
  string token_id = 1;
  string amount = 2;          // USDC amount for buy, token amount for sell
  string side = 3;            // "BUY" or "SELL"
  string fee_rate_bps = 4;    // Fee rate in basis points (optional)
  int64 expiration = 5;       // Order expiration timestamp (optional)
  string nonce = 6;           // Optional nonce
  string worst_price = 7;     // Optional worst acceptable price
}

message PolymarketOrderResponse {
  string order_id = 1;
  string status = 2;          // "LIVE", "MATCHED", "CANCELLED", etc.
  string size_matched = 3;
  string transact_time = 4;
  bool success = 5;
  string error = 6;
  string error_code = 7;
  string price = 8;
  string size = 9;
  string avg_fill_price = 10;
  string created_at = 11;
  // VIB-3710: on-chain setup transactions submitted by _ensure_wallet_ready
  // (token approvals + source-asset wrap to pUSD) before this order. Empty
  // when allowances were already in place AND no wrap was needed. Populated
  // exactly once per order — drained server-side after each response is built
  // so the next order does not double-count the same gas spend.
  repeated PolymarketSetupTx setup_txs = 12;
  // VIB-3710: pUSD fee charged by the Polymarket operator at match time.
  // Decimal string in pUSD (6-decimal) human units, e.g. "0.012345". Empty
  // string when the order did not match (no fee yet) or when the response
  // body did not carry an explicit fee field. Distinct from any signed-order
  // fee — V2 fees are operator-set at match time and are NOT part of the
  // EIP-712 payload.
  string fee_pusd = 13;
}

// VIB-3710: per-tx record of a Polymarket V2 setup transaction (token
// approval or pUSD wrap) submitted by the gateway before an order. The
// strategy container uses these to attribute MATIC gas spend to the
// position whose first BUY triggered the setup.
message PolymarketSetupTx {
  string tx_hash = 1;
