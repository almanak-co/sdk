}

// Senior-Quant header messages -----------------------------------------------
//
// VIB-3969: three cohesive sub-messages, each backed by its own RPC.
// PnLSummary is the eyeball card a strategy operator scans first;
// CostStackInfo and AuditPosture are independently fetchable so a PnL
// consumer never pays for G6 reconciliation or the 21-cell Accountant
// Test matrix.

// PnLSummary — the 5-second eyeball card. Wallet-level NAV/PnL/APR plus
// the cash buffer and the primitive-aware primary-risk gauge that the
// operator-console Position & Risk row renders. Lightweight: latest
// snapshot + portfolio_metrics + first-action ledger anchor.
// All decimals serialized as strings to preserve precision.
message PnLSummary {
  // Money trail (G1, G4, G5)
  string deployed_usd = 1;          // initial + deposits - withdrawals
  string nav_usd = 2;               // current portfolio value
  string lifetime_pnl_usd = 3;      // nav - deployed
  string lifetime_pnl_pct = 4;
  string net_apr_pct = 5;
  string max_drawdown_pct = 6;
  string current_drawdown_pct = 7;
  string value_confidence = 8;      // HIGH | ESTIMATED | STALE | UNAVAILABLE
  int64  age_days = 9;

  // Position + cash
  string deployed_capital_usd = 20; // open positions (sum of cost bases)
  string available_cash_usd = 21;
  int32  open_position_count = 22;

  // Primary-risk gauge (LP range / lending HF / perp leverage). Kept on
  // PnLSummary so the operator console assembles its full eyeball row
  // from one fetch; primitive-specific dashboards typically render their
  // own richer gauge from ``templates/{lp,lending,perp}_dashboard.py``.
  string primary_risk_kind = 30;    // "lp" | "lending" | "perp" | "none"
  string primary_risk_label = 31;   // "Range" | "Health Factor" | "Leverage"
  string primary_risk_value = 32;   // "in-range YES" | "1.78" | "1.7×"
  string primary_risk_color = 33;   // "green" | "yellow" | "red" | "neutral"
}

// CostStackInfo — life-to-date cost & earn decomposition. Same numbers
// the operator console renders in the "Cost stack (LTD)" tile. Generic
// across primitives: every primitive emits Gas, slippage, protocol fees,
// and earnings.
message CostStackInfo {
  string cost_gas_usd = 1;
  string cost_protocol_fees_usd = 2;
  string cost_slippage_usd = 3;
  string fees_earned_usd = 4;
  string interest_paid_usd = 5;
  string interest_earned_usd = 6;
  string funding_paid_usd = 7;
  string funding_earned_usd = 8;
  string realized_pnl_usd = 9;
  string il_usd = 10;               // diagnostic only
}

// AuditPosture — Reconciliation (G6) + audit-trail completeness +
// Accountant Test posture. Server-computed only: clients must never
// reconstruct G6 from sub-fields, since the math would drift between the
// dashboard and the accountant test harness.
message AuditPosture {
  // Reconciliation (G6) — wallet PnL ≡ Σ component PnL invariant.
  string g6_status = 1;             // "PASS" | "FAIL" | "NA"
  string g6_wallet_pnl_usd = 2;
  string g6_component_pnl_usd = 3;
  string g6_gap_usd = 4;
  string g6_epsilon_usd = 5;
  string g6_sum_swap = 6;
  string g6_sum_lp = 7;
  string g6_sum_perp = 8;
  string g6_sum_fees = 9;
  string g6_sum_funding = 10;
  string g6_sum_interest = 11;
  string g6_sum_gas = 12;

  // Audit-trail completeness (G9, G12, G13).
  int32 ledger_total = 20;
  int32 ledger_with_price_inputs = 21;
  int32 ledger_with_pre_post_state = 22;
  int32 ledger_with_gas_usd = 23;
  int32 events_total = 24;
  int32 events_with_versions = 25;

  // Accountant Test posture — 21-cell matrix score per primitive.
  string primitive = 30;            // "lp" | "lending" | "perp" | "swap" | "mixed"
  int32 cells_passed = 31;
  int32 cells_failed = 32;
  int32 cells_xfail = 33;
  int32 cells_total = 34;
  repeated string failing_cells = 35;
  repeated string xfail_cells = 36;
}

message GetPnLSummaryRequest {
  string strategy_id = 1;
}

message GetCostStackRequest {
  string strategy_id = 1;
}

message GetAuditPostureRequest {
  string strategy_id = 1;
}

// Trade tape messages --------------------------------------------------------

message GetTradeTapeRequest {
  string strategy_id = 1;
  int32 limit = 2;
  int64 before_timestamp = 3;       // pagination (unix; 0 = newest first)
}

message GetTradeTapeResponse {
  repeated TradeTapeRow rows = 1;
  bool has_more = 2;
}

// One row per intent (cycle_id), joining transaction_ledger,
// accounting_events, and position_events. JSON pass-throughs are decoded
// client-side for the expander cards.
message TradeTapeRow {
  // Core ledger fields
  string id = 1;
  string cycle_id = 2;
  int64  timestamp = 3;
  string intent_type = 4;
  string token_in = 5;
  string amount_in = 6;
  string token_out = 7;
  string amount_out = 8;
  string effective_price = 9;
  float  slippage_bps = 10;
  int64  gas_used = 11;
  string gas_usd = 12;
  string tx_hash = 13;
  string chain = 14;
  string protocol = 15;
  bool   success = 16;
  string error = 17;

  // Derived USD values
  string amount_in_usd = 20;
  string amount_out_usd = 21;

  // JSON pass-throughs (decoded client-side; opaque on the wire)
  string extracted_data_json = 30;
  string price_inputs_json = 31;
  string pre_state_json = 32;
  string post_state_json = 33;
  string accounting_payload_json = 34;

  // Quick-access derived from accounting_events
  string accounting_event_type = 40;
  string position_key = 41;
  string confidence = 42;
  string unavailable_reason = 43;
  int32  schema_version = 44;
  int32  formula_version = 45;
  int32  matching_policy_version = 46;

  // Linked position event (LP/PERP only; opaque JSON for v1)
  string position_event_json = 50;
  string position_id = 51;
  string position_event_type = 52;

  // Per-row reconciliation (best-effort)
  string row_wallet_delta_usd = 60;
  string row_component_usd = 61;
  string row_residual_usd = 62;
}

// =============================================================================
// Activity feed (VIB-4042 / PR3) — chronologically merged timeline + ledger
// =============================================================================
//
// The activity feed is the dashboard's render path for a strategy's history.
// It interleaves UX cards (timeline_events: STATE_CHANGE, lifecycle markers,
// risk alerts) with financial-truth rows (transaction_ledger entries) into
// a single timestamp-descending stream.
//
// PRD-TimelineEvents §6.1 / §9: clients MUST read this feed via the gateway,
// NOT recompose by separately calling GetTimeline + GetTransactionLedger.
// The compositor lives gateway-side because:
//   1) Cursor pagination over a merged stream needs server-side ordering
//      to be correct under concurrent writes.
//   2) related_ledger_entry_id-based dedup (drop a TIMELINE_EVENT when
//      its referenced LEDGER_ENTRY is in the same window) is centralized
//      here so clients do not re-derive it.
//   3) Hosted Postgres and local SQLite share one query path; the
//      dashboard never branches on backend.
//
// Dedup contract — staged rollout (CodeRabbit on PR #2117):
//   * On backends that carry the `related_ledger_entry_id` correlation
//     column (local SQLite always; hosted Postgres after VIB-4051), dedup
//     is deterministic — every timeline event whose referenced ledger row
//     appears on the same page is dropped.
//   * On backends that do NOT carry the column yet (hosted Postgres
//     pre-VIB-4051), the timeline rows are written with an empty
//     correlation field, so no dedup fires. The merged feed still renders
//     correctly: clients see the timeline card AND the ledger row for
//     the same transaction. Renderers MUST tolerate this case rather
//     than treating duplicates as a backend bug.
// Clients SHOULD NOT depend on dedup as a pre-condition for correctness.
// The ledger row is always the financial truth; the timeline card is UX.
//
// Pagination saturation (CodeRabbit on PR #2117): per-stream cursors
// are timestamp-only, not composite. If a single stream produces more
// than `OVER_FETCH_FACTOR * limit + 1` rows at exactly the same epoch
// second, the tail of that second is unreachable on subsequent pages
// purely from this RPC. Default limits admit 601 over-fetched rows
// per attempt so the case is unreachable in normal operation, but
// the gateway exposes a wire-level degradation signal —
// `GetActivityFeedResponse.backfill_truncated` — set to true whenever
// the backfill loop hits `MAX_BACKFILL_ATTEMPTS` without filling the
// page or exhausting both streams. Clients MUST be able to surface
// this distinct from "end of feed" so operators can detect the
// pathological case (e.g., trigger a different read path or alert).

message GetActivityFeedRequest {
  string strategy_id = 1;
  int32 limit = 2;                  // Default 50, capped server-side at 200
  int64 before_timestamp = 3;       // Cursor: only items at-or-before this timestamp (unix; 0 = newest first)
  string event_type_filter = 4;     // Optional: restrict timeline-side filter (intent-type filter applies to ledger side)
  string intent_type_filter = 5;    // Optional
  // Tie-breaker cursor (VIB-4042 / Gemini review). When multiple items share
  // `before_timestamp`, this composite key (kind:item_id) drops items that
  // sort lexicographically greater-than-or-equal so a tied item is never
  // returned twice nor skipped. Pass the previous response's `next_before_id`;
  // ignored when empty.
  string before_id = 6;
}

message GetActivityFeedResponse {
  repeated ActivityFeedItem items = 1;
  bool has_more = 2;
  int64 next_before_timestamp = 3;  // 0 when has_more=false; otherwise the timestamp to pass on next call
  // Composite tie-breaker key of the last returned item (kind:item_id).
  // Pair with `next_before_timestamp` on the next call. Empty when
  // has_more=false.
  string next_before_id = 4;
  // CodeRabbit on PR #2117 wire-level degradation signal. Set to true
  // ONLY when the backfill loop hit ``MAX_BACKFILL_ATTEMPTS`` without
  // filling the page AND at least one stream still has more rows
  // (``timeline_exhausted`` and ``ledger_exhausted`` are NOT both true).
  // This distinguishes "end of feed" (``has_more=false`` and
  // ``backfill_truncated=false``) from "the tail of a tie-second was
  // dropped" (``has_more=true`` and ``backfill_truncated=true``).
  // Clients MUST surface this in operator-visible UX (the dashboard
  // banners "feed truncated; some rows in the same second may be
  // missing — paginate or query the underlying ledger directly").
  bool backfill_truncated = 5;
}

// One item in the merged feed. Exactly one of `timeline_event` or
// `ledger_entry` is populated, enforced at the schema level via `oneof`
// (CodeRabbit review on PR #2116). `kind` is the discriminator a renderer
// switches on; `WhichOneof("payload")` is the protobuf-side check the
// gateway uses for invariant assertions.
message ActivityFeedItem {
  enum Kind {
    UNKNOWN = 0;
    TIMELINE_EVENT = 1;
    LEDGER_ENTRY = 2;
  }
  Kind kind = 1;
  int64 timestamp = 2;              // Sort key, copied from the inner row
  string strategy_id = 3;
  string cycle_id = 4;              // For grouping in the renderer
  oneof payload {
    TimelineEventInfo timeline_event = 10;
    LedgerEntryInfo ledger_entry = 11;
  }
}

// =============================================================================
// VIB-4493 — Dashboard Production-Ready Rewrite messages
//
// Six new RPCs that expose position_registry / migration_state / reconciliation
// state through the gateway so that framework/dashboard/** has zero direct
// SQLite or .dashboard_events.json access. See parent epic VIB-4492 and
// PortfolioManager/DashboardMay16.md v5 for design.
// =============================================================================

// Cutover state for a (deployment_id, accounting_category) pair. Derived
// gateway-side from migration_state (almanak/framework/state/backends/sqlite.py:720-737)
// plus on-chain reconciliation freshness. NOT a runtime-flippable flag —
// computed live from durable counters.
enum CutoverState {
  CUTOVER_STATE_UNSPECIFIED = 0;
  // migration_state.position_registry_backfill_complete=0 AND backfill_started_at IS NULL
  CUTOVER_STATE_PRE_BACKFILL = 1;
  // migration_state.position_registry_backfill_complete=0 AND backfill_started_at IS NOT NULL
  CUTOVER_STATE_BACKFILL_IN_PROGRESS = 2;
  // migration_state.position_registry_backfill_complete=1 AND on-chain reconciliation < 24h AND parity tests pass
  CUTOVER_STATE_BACKFILL_COMPLETE = 3;
  // All deployments for the accounting category at BACKFILL_COMPLETE for ≥ N
  // consecutive snapshots. Legacy lane safe to delete (Phase 6).
  CUTOVER_STATE_REGISTRY_AUTHORITATIVE = 4;
}

// Where a position row was sourced from. Renderers paint provenance badges
// based on this + PositionConfidence.
enum PositionSource {
  POSITION_SOURCE_UNSPECIFIED = 0;
  POSITION_SOURCE_REGISTRY = 1;     // position_registry (authoritative post-cutover)
  POSITION_SOURCE_SNAPSHOT = 2;     // portfolio_snapshots / position_state_snapshots (transitional)
  POSITION_SOURCE_LEGACY = 3;       // pre-cutover evidence set (Unverified Holdings lane)
}

// Cross-source agreement. HIGH = registry + ledger + snapshot agree. LOW =
// single-source (no cross-check yet). DIVERGED = sources disagree (red row).
enum PositionConfidence {
  POSITION_CONFIDENCE_UNSPECIFIED = 0;
  POSITION_CONFIDENCE_HIGH = 1;
  POSITION_CONFIDENCE_MEDIUM = 2;
  POSITION_CONFIDENCE_LOW = 3;
  POSITION_CONFIDENCE_DIVERGED = 4;
}

// Mirrors position_registry.status CHECK constraint (sqlite.py:644-645).
enum PositionStatus {
  POSITION_STATUS_UNSPECIFIED = 0;
  POSITION_STATUS_OPEN = 1;
  POSITION_STATUS_CLOSED = 2;
  POSITION_STATUS_REORG_INVALIDATED = 3;
}

message GetPositionsRequest {
  string strategy_id = 1;                  // required
  string chain = 2;                        // optional filter
  string primitive = 3;                    // optional filter ("lp", "lending", "perp", ...)
  string accounting_category = 4;          // optional filter ("LP_UNIV3", "AAVE_COLLATERAL", ...)
  PositionStatus status = 5;               // optional; UNSPECIFIED = all statuses
  // Include pre-cutover evidence-set rows (Unverified Holdings) in the
  // `unverified` field of the response. Renderer must surface these under
  // a separate header — they are NEVER mixed with the authoritative lane.
  bool include_legacy_unverified = 6;
}

message GetPositionsResponse {
  // Authoritative / near-authoritative positions (REGISTRY or SNAPSHOT source).
  repeated PositionEntry positions = 1;
  // LEGACY-sourced rows (PRE_BACKFILL). Only populated when
  // include_legacy_unverified=true. Renderer shows under a separate
  // "Unverified Holdings — Registry Pending" header.
  repeated PositionEntry unverified = 2;
  // Per-accounting_category cutover snapshot for this strategy. Renderer
  // uses this to pick the right header per group + render audit badges.
  repeated CutoverStateEntry cutover_states = 3;
}

// Per-(accounting_category) cutover snapshot for a strategy. Exposes the
// raw counters from migration_state so the dashboard audit surface can
// render them directly (no derivation/aggregation outside the gateway).
message CutoverStateEntry {
  string accounting_category = 1;
  CutoverState state = 2;
  int64 rows_synthesized = 3;
  int64 rows_skipped_already_present = 4;
  string backfill_started_at = 5;          // ISO-8601 UTC; empty when never started
  string backfill_completed_at = 6;        // ISO-8601 UTC; empty when not complete
  int32 backfill_reader_version = 7;
  int64 last_reconciled_at_block = 8;      // most-recent reconcile across the category
  int64 last_reconciled_unix_seconds = 9;  // wall-clock approximation for freshness pill
}

// A single position row. Identity from position_registry, valuation from
// portfolio_snapshots + position_state_snapshots. Carries provenance +
// cutover_state so renderers can paint trust badges and route to the
// right header.
message PositionEntry {
  // Display key — registry handle when set, else position_id. Display only.
  string handle = 1;
  // Primary key component. Stable across renames. Use this for follow-up
  // RPC calls (e.g. GetPositionRangeHistory).
  string physical_identity_hash = 2;
  string deployment_id = 3;
  string chain = 4;
  string primitive = 5;
  string accounting_category = 6;
  PositionStatus status = 7;
  int64 opened_at_block = 8;
  int64 closed_at_block = 9;
  string opened_tx = 10;
  string closed_tx = 11;
  string value_usd = 12;                   // decimal-string
  string value_token0 = 13;                // decimal-string; LP-only, empty otherwise
  string value_token1 = 14;                // decimal-string; LP-only, empty otherwise
  PositionSource source = 15;
  PositionConfidence confidence = 16;
  int64 last_reconciled_at_block = 17;
  CutoverState cutover_state = 18;
  // Primitive-specific fields, JSON-encoded. Renderer parses per primitive:
  //   LP      → {tick_lower, tick_upper, liquidity, in_range, fees_token0, fees_token1}
  //   LENDING → {supply_balance, borrow_balance, health_factor, ltv}
  //   PERP    → {leverage, entry_price, mark_price, unrealized_pnl, is_long}
  bytes primitive_payload_json = 19;
  // ISO-8601 "as of" timestamp for the valuation. Drives the freshness pill.
  string value_as_of = 20;
}

message GetPositionRangeHistoryRequest {
  string strategy_id = 1;                  // required
  string chain = 2;                        // required (history is per-chain)
  string accounting_category = 3;          // required
  // Either handle OR physical_identity_hash. If both supplied,
  // physical_identity_hash wins (it's the stable key). At least one is required.
  string handle = 4;
  string physical_identity_hash = 5;
  int64 from_unix_seconds = 6;             // optional; 0 = since position open
  int64 to_unix_seconds = 7;               // optional; 0 = now
}

message GetPositionRangeHistoryResponse {
  // Source-routed by primitive — see RangeHistoryEntry.source_table.
  repeated RangeHistoryEntry entries = 1;
  // Populated for swap/prediction primitives where history concept doesn't
  // apply ("no held position, only intent log"). Renderer shows this instead
  // of an empty table. Empty entries + empty stub_message = genuinely no
  // history (e.g., position just opened in this block).
  string stub_message = 2;
}

message RangeHistoryEntry {
  int64 timestamp_unix_seconds = 1;
  int64 block_number = 2;
  string event_type = 3;                   // OPEN | ADJUST | COLLECT | CLOSE | TRANSFER | NONE
  // Which canonical table this row came from. Renderers MAY render slightly
  // differently per source (e.g., lending events lack tick fields).
  string source_table = 4;                 // "position_events" | "accounting_events"
  // Strong join key back to transaction_ledger.id. Always populated.
  string ledger_entry_id = 5;
  string tx_hash = 6;
  // Primitive-specific payload, JSON-encoded:
  //   LP/PERP  (position_events)  → tick_lower/upper, liquidity, fees, in_range, leverage, entry_price
  //   LENDING  (accounting_events)→ supply_balance, borrow_balance, health_factor, apy
  bytes payload_json = 7;
}

// =============================================================================
// Reconciliation messages (LP-only in v1; stubs for GMX/Pendle/Aave)
// =============================================================================

enum ReconciliationSeverity {
  RECONCILIATION_SEVERITY_UNSPECIFIED = 0;
  RECONCILIATION_SEVERITY_INFO = 1;        // all sources agree
  RECONCILIATION_SEVERITY_WARN = 2;        // 2-of-3 agree, minor drift
  RECONCILIATION_SEVERITY_DIVERGED = 3;    // sources disagree (red row)
}

message GetReconciliationReportRequest {
  string strategy_id = 1;
}

message GetReconciliationReportResponse {
  // Three-way-diff findings across (ledger × snapshots × registry).
  // LP-only in v1; non-LP primitives surface stubs below instead.
  repeated ReconciliationFinding findings = 1;
  // Per-primitive stubs for primitives where the parser isn't shipped yet.
  // Renderer displays one stub card per entry. Today: GMX (VIB-4202),
  // Pendle (VIB-4209), Aave (VIB-4501).
  repeated PrimitiveCoverageStub primitive_stubs = 2;
  // Matches PositionService.Reconcile shape for forensic correlation.
  string reconciliation_id = 3;
  int64 source_block_number = 4;
  // ISO-8601 "computed at". Drives the freshness pill.
  string as_of = 5;
}

message ReconciliationFinding {
  string accounting_category = 1;
  string physical_identity_hash = 2;
  ReconciliationSeverity severity = 3;
  // Human-readable: "ledger says 100 USDC, registry says 95"
  string delta = 4;
  // Three-way coverage flags so operator sees which sources contributed.
  bool ledger_has_row = 5;
  bool snapshot_has_row = 6;
  bool registry_has_row = 7;
  // Display-only suggested next action: e.g. "PreviewReconcile to inspect rebuilt rows".
  string suggested_action = 8;
}

// Per-primitive stub rendered when a reconciliation parser isn't shipped.
message PrimitiveCoverageStub {
  string primitive = 1;                    // "lending" | "perp" | "pendle_lp" | etc.
  string message = 2;                      // "Reconciliation for lending — pending VIB-4501"
  string ticket = 3;                       // "VIB-4501"
}

message PreviewReconcileRequest {
  string strategy_id = 1;
}

message PreviewReconcileResponse {
  // Idempotency key. Bound at preview time to current registry + ledger state
  // hashes. Pass to ApplyReconcile to apply this exact preview. Token
  // invalidates (STATE_DRIFT) if registry or ledger changes between
  // preview and apply.
  string preview_token = 1;
  // The diff that would be applied. Same buckets as
  // PositionService.ReconcileResponse — reused intentionally so renderers
  // can share rendering code.
  repeated MatchedPosition matched = 2;
  repeated PhantomMissingPosition phantom_missing = 3;
  repeated StrandedRow stranded = 4;
  // Non-LP primitives surface stubs (LP-only in v1).
  repeated PrimitiveCoverageStub primitive_stubs = 5;
  // Forensic correlation with PositionService.Reconcile audit trail.
  string reconciliation_id = 6;
  int64 source_block_number = 7;
  // Server-side TTL on the preview_token. Default 5 minutes.
  int64 expires_at_unix_seconds = 8;
}

message ApplyReconcileRequest {
  string strategy_id = 1;
  // Token issued by PreviewReconcile. INVALID_ARGUMENT if empty.
  string preview_token = 2;
}

message ApplyReconcileResponse {
  // "SUCCESS"          — all phantom_missing rows applied cleanly.
  // "STATE_DRIFT"      — registry/ledger state changed since preview was issued.
  //                      Operator must re-issue PreviewReconcile.
  // "PARTIAL_SUCCESS"  — some phantom_missing rows applied, others failed
  //                      (existing per-phantom error isolation; see
  //                      primitive_errors for the failures).
  // "EXPIRED"          — preview_token TTL elapsed.
  // "NOT_FOUND"        — preview_token unrecognized.
  string result = 1;
  string detail = 2;
  repeated RebuiltRow rebuilt = 3;
  repeated PrimitiveError primitive_errors = 4;
  string reconciliation_id = 5;
}

message RefreshRegistryFromChainRequest {
  string strategy_id = 1;
}

message RefreshRegistryFromChainResponse {
  // "SUCCESS"      — fresh chain reads completed; on_chain_verified_at updated.
  // "RATE_LIMITED" — another refresh is already in flight for this strategy.
  // "FAILED"       — see `detail` for diagnostic.
  string result = 1;
  string detail = 2;
  int32 positions_refreshed = 3;
  int32 events_emitted = 4;                // count of divergent position_events re-emitted
  int64 source_block_number = 5;
  string reconciliation_id = 6;
}

// =============================================================================
// PolymarketService - Polymarket CLOB API proxy
// =============================================================================

service PolymarketService {
  // Market data endpoints
  rpc GetMarket(PolymarketGetMarketRequest) returns (PolymarketMarketResponse);
  rpc GetMarkets(PolymarketGetMarketsRequest) returns (PolymarketMarketsResponse);
  rpc GetSimplifiedMarkets(PolymarketGetSimplifiedMarketsRequest) returns (PolymarketSimplifiedMarketsResponse);

  // Order book and pricing
  rpc GetOrderBook(PolymarketOrderBookRequest) returns (PolymarketOrderBookResponse);
  rpc GetMidpoint(PolymarketMidpointRequest) returns (PolymarketMidpointResponse);
  rpc GetPrice(PolymarketPriceRequest) returns (PolymarketPriceResponse);
  rpc GetSpread(PolymarketSpreadRequest) returns (PolymarketSpreadResponse);
  rpc GetTickSize(PolymarketTickSizeRequest) returns (PolymarketTickSizeResponse);

  // Order management (requires credentials - handled by gateway)
  rpc CreateAndPostOrder(PolymarketCreateOrderRequest) returns (PolymarketOrderResponse);
  rpc CreateAndPostMarketOrder(PolymarketMarketOrderRequest) returns (PolymarketOrderResponse);
  rpc CancelOrder(PolymarketCancelOrderRequest) returns (PolymarketCancelResponse);
  rpc CancelOrders(PolymarketCancelOrdersRequest) returns (PolymarketCancelResponse);
  rpc CancelAll(PolymarketCancelAllRequest) returns (PolymarketCancelResponse);

  // Position and trade queries
  rpc GetPositions(PolymarketGetPositionsRequest) returns (PolymarketPositionsResponse);
  rpc GetOpenOrders(PolymarketGetOpenOrdersRequest) returns (PolymarketOpenOrdersResponse);
  rpc GetTradesHistory(PolymarketGetTradesRequest) returns (PolymarketTradesResponse);
  rpc GetOrder(PolymarketGetOrderRequest) returns (PolymarketOrderInfoResponse);

  // Historical data
  rpc GetPriceHistory(PolymarketGetPriceHistoryRequest) returns (PolymarketPriceHistoryResponse);
  // ``GetTradeTape`` (NOT ``GetTrades``) intentionally avoids colliding with
  // the existing ``GetTradesHistory`` RPC above. The two have different
  // semantics: ``GetTradesHistory`` is the gateway-managed wallet's own fills
  // (authenticated /trades), while ``GetTradeTape`` is the public market-wide
  // trade tape (authenticated /data/trades, optional token filter).
  rpc GetTradeTape(PolymarketGetTradeTapeRequest) returns (PolymarketTradeTapeResponse);

  // Balance queries
  rpc GetBalanceAllowance(PolymarketBalanceAllowanceRequest) returns (PolymarketBalanceAllowanceResponse);
}

// =============================================================================
// Polymarket Market Data Messages
// =============================================================================

message PolymarketGetMarketRequest {
  string condition_id = 1;    // Backward-compatible alias for market ID
  string slug = 2;            // Optional market slug
}

message PolymarketMarketResponse {
  string condition_id = 1;
  string question_id = 2;
  repeated string tokens = 3;           // Token IDs for outcomes
  string rewards_daily_rate = 4;
  string rewards_min_size = 5;
  string rewards_max_spread = 6;
  bool active = 7;
  bool closed = 8;
  bool accepting_orders = 9;
  string accepting_order_timestamp = 10;
  string minimum_order_size = 11;
  string minimum_tick_size = 12;
  bool success = 13;
  string error = 14;
  string market_id = 15;
  string question = 16;
  string slug = 17;
  repeated string outcomes = 18;
  repeated string outcome_prices = 19;
  repeated string clob_token_ids = 20;
  string volume = 21;
  string volume_24hr = 22;
  string liquidity = 23;
  string end_date = 24;
  bool enable_order_book = 25;
  string maker_base_fee_bps = 26;
  string taker_base_fee_bps = 27;
  string best_bid = 28;
  string best_ask = 29;
  string last_trade_price = 30;
  string event_id = 31;
  string event_slug = 32;
  string group_slug = 33;
  repeated string tags = 34;
  string raw_json = 35;       // Full Gamma market payload
}

message PolymarketGetMarketsRequest {
  string next_cursor = 1;     // Pagination cursor (optional)
  string filters_json = 2;    // JSON-encoded MarketFilters payload
}

message PolymarketMarketsResponse {
  repeated PolymarketMarketResponse markets = 1;
  string next_cursor = 2;
  bool success = 3;
  string error = 4;
}

message PolymarketGetSimplifiedMarketsRequest {
  string next_cursor = 1;     // Pagination cursor (optional)
}

message PolymarketSimplifiedMarket {
  string condition_id = 1;
  repeated string tokens = 2;
  string min_incentive_size = 3;
  string max_incentive_spread = 4;
  bool active = 5;
  bool closed = 6;
}

message PolymarketSimplifiedMarketsResponse {
  repeated PolymarketSimplifiedMarket markets = 1;
  string next_cursor = 2;
  bool success = 3;
  string error = 4;
}

// =============================================================================
// Polymarket Order Book Messages
