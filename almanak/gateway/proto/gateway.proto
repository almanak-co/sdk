  string error = 4;
}

message PolymarketGetOrderRequest {
  string order_id = 1;
}

message PolymarketOrderInfoResponse {
  string order_id = 1;
  string market = 2;
  string asset_id = 3;
  string side = 4;
  string price = 5;
  string original_size = 6;
  string size_matched = 7;
  string status = 8;
  string outcome = 9;
