syntax = "proto3";

package almanak.gateway.proto;

// =============================================================================
// Health Service (standard gRPC health protocol)
// =============================================================================

// Health check service for gateway liveness/readiness probes.
// Implements the standard gRPC health checking protocol.
service Health {
  // Check if the service is healthy.
  rpc Check(HealthCheckRequest) returns (HealthCheckResponse);

  // Watch for health status changes (streaming).
  rpc Watch(HealthCheckRequest) returns (stream HealthCheckResponse);

  // Pre-initialize execution orchestrators and compilers for specified chains.
  rpc RegisterChains(RegisterChainsRequest) returns (RegisterChainsResponse);
}

message HealthCheckRequest {
  // Service name to check. Empty string checks the overall server health.
  string service = 1;
}

message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    SERVICE_UNKNOWN = 3;  // Used for Watch when service is not found
  }
  ServingStatus status = 1;
}

message RegisterChainsRequest {
  repeated string chains = 1;      // Chain names to pre-initialize (e.g., "arbitrum", "base")
  string wallet_address = 2;       // Wallet address for orchestrator initialization
}

message RegisterChainsResponse {
  bool success = 1;
  repeated string initialized_chains = 2;  // Chains that were successfully initialized
  string wallet_address = 3;               // Wallet address derived from gateway private key
  string error = 4;
  map<string, string> chain_wallets = 5;   // Per-chain wallet addresses resolved from wallet registry
}

// =============================================================================
// Common Messages
// =============================================================================

message Empty {}

// =============================================================================
// MarketService - provides access to market data
// =============================================================================

service MarketService {
  // Get token price from aggregated sources.
  rpc GetPrice(PriceRequest) returns (PriceResponse);

  // Get token balance for strategy wallet.
  rpc GetBalance(BalanceRequest) returns (BalanceResponse);

  // Get token balances across multiple chains in a single call.
  rpc BatchGetBalances(BatchBalanceRequest) returns (BatchBalanceResponse);

  // Get technical indicator value.
  rpc GetIndicator(IndicatorRequest) returns (IndicatorResponse);

  // Resolve a Uniswap V4 pool_id (keccak256 of abi.encode(PoolKey)) back to
  // its canonical PoolKey (currency0, currency1, fee, tickSpacing, hooks).
  // VIB-4472 (T03) — needed by the V4 receipt parser to enrich LP / SWAP
  // events whose on-chain log payload carries the bytes32 id rather than
  // the structured key. The gateway populates the cache from observed
  // PoolManager.Initialize events; unknown ids return NOT_FOUND.
  rpc LookupV4PoolKey(LookupV4PoolKeyRequest) returns (LookupV4PoolKeyResponse);
}

message PriceRequest {
  string token = 1;
  string quote = 2;  // Default: USD
  // Optional chain hint. Required for address-based lookups (so the gateway
  // knows which chain to resolve an unknown contract address on) and for
  // picking the right CoinGecko asset-platform for the contract-address
  // pricing endpoint. Empty string = fall back to the gateway's primary chain.
  string chain = 3;
}

message PriceResponse {
  string price = 1;  // Decimal as string
  int64 timestamp = 2;
  string source = 3;
  double confidence = 4;  // 0.0-1.0
  bool stale = 5;
  repeated string sources_ok = 6;
  map<string, string> sources_failed = 7;
  repeated string outliers = 8;
}

message BalanceRequest {
  string token = 1;
  string chain = 2;
  string wallet_address = 3;
}

message BalanceResponse {
  string balance = 1;  // Decimal as string (human-readable units)
  string balance_usd = 2;
  string address = 3;
  int32 decimals = 4;
  string raw_balance = 5;  // Wei/raw units as string
  int64 timestamp = 6;
  bool stale = 7;
  string error = 8;  // Per-response error for batch calls
}

message BatchBalanceRequest {
  repeated BalanceRequest requests = 1;
}

message BatchBalanceResponse {
  repeated BalanceResponse responses = 1;
}

message IndicatorRequest {
  string indicator_type = 1;  // "RSI", "MACD", "SMA", etc.
  string token = 2;
  string quote = 3;
  map<string, string> params = 4;  // e.g., {"period": "14", "timeframe": "1h"}
}

message IndicatorResponse {
  string value = 1;  // Primary indicator value as string
  map<string, string> metadata = 2;  // Additional data (e.g., signal line for MACD)
  int64 timestamp = 3;
}

// Uniswap V4 pool key resolution (VIB-4472 / T03).
//
// In V4, a pool is identified on-chain by ``pool_id =
// keccak256(abi.encode(currency0, currency1, fee, tickSpacing, hooks))``.
// The hash is irreversible, so resolving an id back to the structured key
// requires an external source. The gateway maintains a derivation cache
// populated from observed ``PoolManager.Initialize`` events.
message LookupV4PoolKeyRequest {
  bytes pool_id = 1;  // 32 raw bytes
  string chain = 2;   // e.g. "base"
}

// PoolKey serialization matches the V4 PoolManager struct layout. The
// ``currency0 < currency1`` invariant is enforced by the gateway on every
// response.
message PoolKey {
  string currency0 = 1;     // EVM address (lowercased 0x-prefixed hex)
  string currency1 = 2;     // EVM address (lowercased 0x-prefixed hex)
  uint32 fee = 3;           // Fee in hundredths of a bip (uint24)
  int32 tick_spacing = 4;   // Tick spacing (int24)
  string hooks = 5;         // Hook contract address (zero address = no hooks)
}

message LookupV4PoolKeyResponse {
  PoolKey pool_key = 1;
  string chain = 2;
}

// =============================================================================
// StateService - handles strategy state persistence
// =============================================================================

service StateService {
  // Load strategy state from persistence.
  rpc LoadState(LoadStateRequest) returns (StateData);

  // Save strategy state with optimistic locking.
  rpc SaveState(SaveStateRequest) returns (SaveStateResponse);

  // Delete strategy state.
  rpc DeleteState(DeleteStateRequest) returns (DeleteStateResponse);

  // Save a portfolio snapshot for value tracking.
  rpc SavePortfolioSnapshot(SaveSnapshotRequest) returns (SaveSnapshotResponse);

  // Get the most recent portfolio snapshot.
  rpc GetLatestSnapshot(GetLatestSnapshotRequest) returns (SnapshotData);

  // Get portfolio snapshots since a given timestamp.
  rpc GetSnapshotsSince(GetSnapshotsSinceRequest) returns (SnapshotList);

  // Save or update portfolio metrics (PnL baseline).
  rpc SavePortfolioMetrics(SaveMetricsRequest) returns (SaveMetricsResponse);

  // Get portfolio metrics for a strategy.
  rpc GetPortfolioMetrics(GetMetricsRequest) returns (PortfolioMetricsData);

  // Save a transaction ledger entry (VIB-3201).
  // Persists a single structured trade record to the transaction_ledger table.
  // Fail-closed: on DB failure the server returns success=false and the client
  // is expected to raise AccountingPersistenceError so the runner halts the
  // iteration with ACCOUNTING_FAILED (see VIB-3157).
  rpc SaveLedgerEntry(SaveLedgerEntryRequest) returns (SaveLedgerEntryResponse);

  // Save a typed accounting event (VIB-3449).
  // Persists a lending / Pendle accounting event to the accounting_events table.
  // Non-blocking in non-live modes; raises AccountingPersistenceError in live.
  rpc SaveAccountingEvent(SaveAccountingEventRequest) returns (SaveAccountingEventResponse);

  // Save a position lifecycle event (VIB-3449).
  // Persists LP / perp position events to the position_events table.
  // Non-blocking writes; logs warnings on failure.
  rpc SavePositionEvent(SavePositionEventRequest) returns (SavePositionEventResponse);

  // Read full position lifecycle (VIB-3944).
  // Returns OPEN -> SNAPSHOT* -> CLOSE events in chronological order for a
  // single (deployment_id, position_id). Used by ``pnl_attributor`` to pair
  // a CLOSE with its matching OPEN for FIFO realised-PnL attribution.
  // Read-side fail-quiet: on backend error the gateway returns an empty
  // list rather than raising, so a transient gRPC blip degrades attribution
  // (loud warning in pnl_attributor) instead of halting the runner.
  rpc GetPositionHistory(GetPositionHistoryRequest) returns (GetPositionHistoryResponse);

  // Partial-update of attribution_json + attribution_version on a single
  // position_event row (VIB-3944 write-half companion to GetPositionHistory).
  // Without this RPC pnl_attributor.run_attribution_on_close falls back to
  // ``save_position_event`` which is INSERT OR IGNORE and silently NO-OPs
  // because the row already exists, so the computed attribution_json never
  // reaches disk in gateway-sidecar mode. Mirrors the SQLite signature
  // ``update_position_attribution(event_id, attribution_json, attribution_version)``.
  // Non-blocking write: returns success=false on backend error rather than
  // raising — pnl_attributor wraps the call in a logged try/except already.
  rpc UpdatePositionAttribution(UpdatePositionAttributionRequest) returns (UpdatePositionAttributionResponse);

  // Read accounting events (VIB-3503 Part 2c).
  // Used by FIFO basis store reconstruction at runner startup and by
  // PortfolioValuer cost-basis enrichment per snapshot. Read-side is
  // fail-quiet: on error returns an empty list rather than raising,
  // since stale PnL is preferred over halting snapshot building.
  rpc GetAccountingEvents(GetAccountingEventsRequest) returns (GetAccountingEventsResponse);

  // Accounting outbox RPCs — crash-safe durability layer for the async
  // AccountingProcessor. DDL landed in metrics-database PR #24 (VIB-3503).
  // Without these, save_outbox_entry raises NotImplementedError and the
  // processor never fires in hosted mode (no typed accounting events reach PG).
  rpc SaveOutboxEntry(SaveOutboxEntryRequest) returns (SaveOutboxEntryResponse);
  rpc GetOutboxEntry(GetOutboxEntryRequest) returns (GetOutboxEntryResponse);
  rpc GetOutboxPending(GetOutboxPendingRequest) returns (GetOutboxPendingResponse);
  rpc UpdateOutboxEntry(UpdateOutboxEntryRequest) returns (UpdateOutboxEntryResponse);

  // Idempotency check: does accounting_events already have a row for this ledger entry?
  // Used by AccountingProcessor.drain_one before re-processing a row.
  rpc HasAccountingEventsForLedger(HasAccountingEventsForLedgerRequest) returns (HasAccountingEventsForLedgerResponse);

  // Ledger entry read — used by AccountingProcessor.drain_one to fetch the
  // transaction_ledger row for category-handler processing in hosted mode.
  rpc GetLedgerEntry(GetLedgerEntryRequest) returns (GetLedgerEntryResponse);

  // Read-side gas aggregator for portfolio_metrics.gas_spent_usd (VIB-4247).
  // Sums transaction_ledger.gas_usd for a deployment. The gateway performs the
  // DB read because hosted strategy containers cannot access Postgres directly.
  rpc SumLedgerGasUsd(SumLedgerGasUsdRequest) returns (SumLedgerGasUsdResponse);

  // Cutover storage RPCs — per-(deployment_id, primitive, cutover_key)
  // migration_state CRUD + position_registry read + atomic ledger+registry
  // commit (VIB-4208 / T22 of multi-position-tracking epic).
  //
  // Backed by SQLite only on the gateway side; the Postgres branch of every
  // handler returns gRPC UNIMPLEMENTED so the framework client adapter
  // (GatewayStateManager) translates that into CutoverStorageNotSupported
  // and the cutover boot guard degrades to the legacy save_ledger_entry
  // path (cutover spec §2.4 pre-T19 contract). The Postgres half + the
  // cross-repo metrics-database migration land in T19 (VIB-4205).
  //
  // _POSTGRES_DEFERRED_TABLES in schema_contract.py keeps both
  // migration_state and position_registry out of the hosted boot contract.
  //
  // The BackfillReader path (update_migration_state / mark_backfill_complete /
  // get_position_events_filtered / insert_position_registry_row_if_absent)
  // is intentionally NOT wired here. Per cutover spec §2.4, fresh
  // deployments (no legacy position_events to migrate) skip the backfill
  // loop entirely — the boot guard seeds migration_state with
  // position_registry_backfill_complete=1 directly. Legacy-data backfill
  // for hosted Postgres lands with T19 / VIB-4205.
  rpc UpsertMigrationState(UpsertMigrationStateRequest) returns (UpsertMigrationStateResponse);
  rpc GetMigrationState(GetMigrationStateRequest) returns (GetMigrationStateResponse);
  // In-flight backfill progress writes — cutover spec §3.3.
  // Only the supplied columns are written (partial update).
  rpc UpdateMigrationState(UpdateMigrationStateRequest) returns (UpdateMigrationStateResponse);
  // Terminal flip — set complete=1 + final counters + completed_at.
  rpc MarkBackfillComplete(MarkBackfillCompleteRequest) returns (MarkBackfillCompleteResponse);
  // Streamed position_events read used by the backfill reader's fold pass.
  // Fresh deployments return [] (no legacy data) — that empty result
  // drives the backfill loop to flip complete=1 with no rows synthesized,
  // which is exactly the cutover spec §2.4 "no migration needed" case.
  rpc GetPositionEventsFiltered(GetPositionEventsFilteredRequest) returns (GetPositionEventsFilteredResponse);
  rpc GetPositionRegistryOpenRows(GetPositionRegistryOpenRowsRequest) returns (GetPositionRegistryOpenRowsResponse);
  // Atomic ledger + position_registry + handle commit (T11 / VIB-4197
  // primitive). On SQLite the gateway delegates to
  // SQLiteStore.save_ledger_and_registry_atomic which wraps all three
  // writes in a single BEGIN IMMEDIATE / COMMIT transaction.
  rpc SaveLedgerAndRegistry(SaveLedgerAndRegistryRequest) returns (SaveLedgerAndRegistryResponse);
}

message LoadStateRequest {
  string strategy_id = 1;
}

message StateData {
  string strategy_id = 1;
  int64 version = 2;
  bytes data = 3;  // JSON-serialized state
  int32 schema_version = 4;
  string checksum = 5;  // SHA-256 hex
  int64 created_at = 6;
  int64 updated_at = 7;
  string loaded_from = 8;  // "hot", "warm"
}

message SaveStateRequest {
  string strategy_id = 1;
  int64 expected_version = 2;  // For optimistic locking (0 = new state)
  bytes data = 3;  // JSON-serialized state
  int32 schema_version = 4;
}

message SaveStateResponse {
  bool success = 1;
  int64 new_version = 2;
  string error = 3;
  string checksum = 4;
}

message DeleteStateRequest {
  string strategy_id = 1;
}

message DeleteStateResponse {
  bool success = 1;
  string error = 2;
}

// Portfolio snapshot messages
message SaveSnapshotRequest {
  string strategy_id = 1;
  int64 timestamp = 2;  // Unix epoch seconds
  int32 iteration_number = 3;
  string total_value_usd = 4;
  string available_cash_usd = 5;
  string value_confidence = 6;  // "HIGH", "ESTIMATED", "STALE", "UNAVAILABLE"
  bytes positions_json = 7;  // JSON-serialized positions array
  string chain = 8;
  // Phase 4 accounting identity (VIB-2835/2837/2839 / VIB-4091) — mirrors
  // SaveMetricsRequest. Required for cycle_id correlation across
  // transaction_ledger / portfolio_metrics / portfolio_snapshots.
  string deployment_id = 9;
  string cycle_id = 10;
  string execution_mode = 11;
}

message SaveSnapshotResponse {
  bool success = 1;
  int64 snapshot_id = 2;
  string error = 3;
}

message GetLatestSnapshotRequest {
  string strategy_id = 1;
}

message GetSnapshotsSinceRequest {
  string strategy_id = 1;
  int64 since = 2;  // Unix epoch seconds
  int32 limit = 3;  // Max snapshots to return (default 168)
}

message SnapshotData {
  string strategy_id = 1;
  int64 timestamp = 2;
  int32 iteration_number = 3;
  string total_value_usd = 4;
  string available_cash_usd = 5;
  string value_confidence = 6;
  bytes positions_json = 7;
  string chain = 8;
  bool found = 9;  // False if no snapshot exists
  // Phase 4 accounting identity (VIB-2835/2837/2839 / VIB-4091).
  string deployment_id = 10;
  string cycle_id = 11;
  string execution_mode = 12;
}

message SnapshotList {
  repeated SnapshotData snapshots = 1;
}

// Portfolio metrics messages (PnL baseline tracking)
message SaveMetricsRequest {
  string strategy_id = 1;
  string initial_value_usd = 2;
  int64 initial_timestamp = 3;  // Unix epoch seconds
  string deposits_usd = 4;
  string withdrawals_usd = 5;
  string gas_spent_usd = 6;
  // Phase 4 accounting identity fields (VIB-2835/2837/2839)
  string deployment_id = 7;
  string cycle_id = 8;
  string execution_mode = 9;
  bool is_complete = 10;
}

message SaveMetricsResponse {
  bool success = 1;
  string error = 2;
}

message GetMetricsRequest {
  string strategy_id = 1;
}

message PortfolioMetricsData {
  string strategy_id = 1;
  string initial_value_usd = 2;
  int64 initial_timestamp = 3;
  string deposits_usd = 4;
  string withdrawals_usd = 5;
  string gas_spent_usd = 6;
  int64 updated_at = 7;
  bool found = 8;
  // Phase 4 accounting identity fields (VIB-2835/2837/2839)
  string deployment_id = 9;
  string cycle_id = 10;
  string execution_mode = 11;
  bool is_complete = 12;
}

// Ledger entry messages (VIB-3201) -- mirrors the LedgerEntry dataclass in
// almanak/framework/observability/ledger.py. Field order follows the dataclass
// so drift between the two is easy to spot in review.
message SaveLedgerEntryRequest {
  string id = 1;                   // UUID primary key (idempotent ON CONFLICT target)
  string cycle_id = 2;
  string strategy_id = 3;
  string deployment_id = 4;        // Phase 4 identity (VIB-2835)
  string execution_mode = 5;       // "live" | "paper" | "dry_run" (VIB-2837)
  int64 timestamp = 6;             // Unix epoch seconds
  string intent_type = 7;
  string token_in = 8;
  string amount_in = 9;            // Decimal string (preserves precision)
  string token_out = 10;
  string amount_out = 11;          // Decimal string
  string effective_price = 12;     // Decimal string, "" when not applicable
  // Optional so "no slippage" (None in the dataclass) is distinguishable from 0.0.
  optional double slippage_bps = 13;
  int64 gas_used = 14;
  string gas_usd = 15;              // Decimal string, "" when unknown
  string tx_hash = 16;
  string chain = 17;
  string protocol = 18;
  bool success = 19;
  string error = 20;
  bytes extracted_data_json = 21;   // Serialised extracted_data dict (may be empty)
  bytes price_inputs_json = 22;     // Token prices at execution time — enables replay (VIB-3480)
  bytes pre_state_json = 23;        // On-chain state before execution (VIB-3480)
  bytes post_state_json = 24;       // On-chain state after execution (VIB-3480)
}

message SaveLedgerEntryResponse {
  bool success = 1;
  string error = 2;
}

// Accounting event messages (VIB-3449) -- mirrors the AccountingIdentity +
// event payload in almanak/framework/accounting/models.py. The typed payload
// is serialised as JSON (payload_json) so the proto is stable across schema
// versions; schema_version lets readers know which formula produced the row.
message SaveAccountingEventRequest {
  // AccountingIdentity fields
  string id = 1;                    // UUID primary key (idempotent ON CONFLICT target)
  string deployment_id = 2;
  string strategy_id = 3;
  string cycle_id = 4;
  string execution_mode = 5;        // "live" | "paper" | "dry_run"
  int64 timestamp = 6;              // Unix epoch seconds
  string chain = 7;
  string protocol = 8;
  string wallet_address = 9;
  string tx_hash = 10;
  string ledger_entry_id = 11;      // FK to transaction_ledger
  // Discriminator + payload
  string event_type = 12;           // e.g. "SUPPLY", "BORROW", "PT_BUY"
  string position_key = 13;         // Strategy-scoped position identifier
  string confidence = 14;           // "HIGH" | "ESTIMATED" | "STALE" | "UNAVAILABLE"
  bytes payload_json = 15;          // JSON-serialised typed payload (LendingAccountingEvent, etc.)
  int32 schema_version = 16;
}

message SaveAccountingEventResponse {
  bool success = 1;
  string error = 2;
}

// Position event messages (VIB-3449) -- mirrors the PositionEvent dataclass in
// almanak/framework/observability/position_events.py.  Field order matches the
// dataclass so drift between the two is easy to spot in review.
message SavePositionEventRequest {
  string id = 1;                    // UUID primary key (idempotent ON CONFLICT / INSERT OR IGNORE)
  string deployment_id = 2;
  string cycle_id = 3;
  string execution_mode = 4;        // "live" | "paper" | "dry_run"
  string position_id = 5;
  string position_type = 6;         // "LP" | "PERP"
  string event_type = 7;            // "OPEN" | "CLOSE" | "COLLECT_FEES" | "SNAPSHOT"
  int64 timestamp = 8;              // Unix epoch seconds
  string protocol = 9;
  string chain = 10;
  // Token amounts
  string token0 = 11;
  string token1 = 12;
  string amount0 = 13;
  string amount1 = 14;
  string value_usd = 15;
  // LP-specific
  optional int64 tick_lower = 16;
  optional int64 tick_upper = 17;
  string liquidity = 18;
  optional bool in_range = 19;
  string fees_token0 = 20;
  string fees_token1 = 21;
  // Perp-specific
  string leverage = 22;
  string entry_price = 23;
  string mark_price = 24;
  string unrealized_pnl = 25;
  optional bool is_long = 26;
  // Execution details
  string tx_hash = 27;
  string gas_usd = 28;
  string ledger_entry_id = 29;
  // Protocol fees (VIB-3205): empty string = unknown, "0" = measured zero
  string protocol_fees_usd = 30;
  // Attribution
  string attribution_json = 31;
  int32 attribution_version = 32;
}

message SavePositionEventResponse {
  bool success = 1;
  string error = 2;
}

// Position event read messages (VIB-3944) -- the response carries one
// PositionEventData per row from the position_events table for a given
// (deployment_id, position_id), ordered chronologically (OPEN -> SNAPSHOT* ->
// CLOSE). Field order on PositionEventData mirrors SavePositionEventRequest
// so wire-shape drift between writer and reader is easy to spot in review.
message GetPositionHistoryRequest {
  string strategy_id = 1;     // resolved to agent_id at the gateway via resolve_agent_id
  string deployment_id = 2;   // required
  string position_id = 3;     // required
}

message PositionEventData {
  string id = 1;                    // UUID primary key
  string deployment_id = 2;
  string cycle_id = 3;
  string execution_mode = 4;
  string position_id = 5;
  string position_type = 6;
  string event_type = 7;
  int64 timestamp = 8;              // Unix epoch seconds
  string protocol = 9;
  string chain = 10;
  // Token amounts
  string token0 = 11;
  string token1 = 12;
  string amount0 = 13;
  string amount1 = 14;
  string value_usd = 15;
  // LP-specific
  optional int64 tick_lower = 16;
  optional int64 tick_upper = 17;
  string liquidity = 18;
  optional bool in_range = 19;
  string fees_token0 = 20;
  string fees_token1 = 21;
  // Perp-specific
  string leverage = 22;
  string entry_price = 23;
  string mark_price = 24;
  string unrealized_pnl = 25;
  optional bool is_long = 26;
  // Execution details
  string tx_hash = 27;
  string gas_usd = 28;
  string ledger_entry_id = 29;
  string protocol_fees_usd = 30;
  // Attribution
  string attribution_json = 31;
  int32 attribution_version = 32;
}

message GetPositionHistoryResponse {
  repeated PositionEventData events = 1;
}

// Partial-update of position event attribution columns (VIB-3944 write-half).
// Mirrors the SQLite ``update_position_attribution(event_id, attribution_json,
// attribution_version)`` signature so pnl_attributor.run_attribution_on_close
// can reach disk in gateway-sidecar mode. event_id is a UUID; attribution_json
// is the serialized attribution payload; attribution_version is the formula
// version stamp (``CURRENT_VERSION``).
message UpdatePositionAttributionRequest {
  string event_id = 1;             // UUID of the position_events row to UPDATE
  string attribution_json = 2;     // serialized attribution payload (overwrites column)
  int32 attribution_version = 3;   // formula version stamp
  // Optional defense-in-depth scope (CR audit on PR #2018). The SQLite
  // backing query keys on the UUID event_id which is globally unique by
  // construction, so this field is unused at the data layer today. It is
  // accepted on the wire for future hosted PostgresStore implementations
  // that may want to enforce per-tenant scoping at the WHERE clause. Empty
  // is allowed (no scope check); non-empty is validated at the gateway.
  string deployment_id = 4;
}

message UpdatePositionAttributionResponse {
  bool success = 1;                // true iff the UPDATE matched a row
  string error = 2;                // empty when success=true
}

// Read accounting events (VIB-3503 Part 2c) -- mirrors SaveAccountingEventRequest
// field-for-field so the wire shape is symmetric between writers and readers.
// Empty-string filters mean "no filter on this field" (matches the convention
// established by other Save* RPCs that treat "" as the unset sentinel).
message GetAccountingEventsRequest {
  string strategy_id = 1;     // resolved to agent_id at the gateway via resolve_agent_id
  string deployment_id = 2;   // required
  string position_key = 3;    // "" = no filter
  string event_type = 4;      // "" = no filter
  int64 since_timestamp = 5;  // Unix epoch seconds; 0 = no lower bound
  int32 limit = 6;            // 0 = no limit (FIFO basis-store reconstruction needs full history)
}

message AccountingEvent {
  string id = 1;                    // UUIDv5, deterministic from (deployment, cycle, intent_type, tx, position)
  string deployment_id = 2;
  string strategy_id = 3;           // PG `agent_id` mapped back to strategy_id on the wire
  string cycle_id = 4;
  string execution_mode = 5;
  int64 timestamp = 6;              // Unix epoch seconds
  string chain = 7;
  string protocol = 8;
  string wallet_address = 9;
  string event_type = 10;
  string position_key = 11;
  string ledger_entry_id = 12;
  string tx_hash = 13;
  string confidence = 14;
  bytes payload_json = 15;          // JSON-serialised typed payload
  int32 schema_version = 16;
}

message GetAccountingEventsResponse {
  repeated AccountingEvent events = 1;
}

// Accounting outbox messages — mirrors the accounting_outbox table in
// metrics-database (PR #24). The request carries BOTH keys explicitly:
// `outbox_id` (SQLite UUID idempotency key, INSERT OR IGNORE) and
// `ledger_entry_id` (PG primary key, FK to transaction_ledger). There is no
// `id` field on this request — typed callers must pass `outbox_id=` and
// `ledger_entry_id=` by name. The unified `id` alias lives only on the
// returned `OutboxEntry` (= ledger_entry_id on PG, UUID on SQLite) so
// drain_one stays compatible across backends.
message SaveOutboxEntryRequest {
  string outbox_id = 1;        // UUID (INSERT OR IGNORE; ignored on PG where PK = ledger_entry_id)
  string deployment_id = 2;
  string strategy_id = 3;      // resolved to agent_id at the gateway
  string cycle_id = 4;
  string ledger_entry_id = 5;  // FK to transaction_ledger (PG primary key)
  string intent_type = 6;
  string wallet_address = 7;
  string position_key = 8;
  string market_id = 9;
  string created_at = 10;      // ISO 8601 timestamp
}
message SaveOutboxEntryResponse {
  bool success = 1;
  string error = 2;
}

message OutboxEntry {
  string id = 1;               // = ledger_entry_id on PG, UUID on SQLite
  string deployment_id = 2;
  string strategy_id = 3;
  string cycle_id = 4;
  string ledger_entry_id = 5;
  string intent_type = 6;
  string wallet_address = 7;
  string position_key = 8;
  string market_id = 9;
  string status = 10;          // "pending" | "processing" | "processed" | "failed"
  int32 attempts = 11;         // maps to retry_count in PG
  string error = 12;           // maps to last_error in PG
  string created_at = 13;
  string updated_at = 14;
}

message GetOutboxEntryRequest {
  string ledger_entry_id = 1;
}
message GetOutboxEntryResponse {
  bool found = 1;
  OutboxEntry entry = 2;
}

message GetOutboxPendingRequest {
  string deployment_id = 1;
  int32 max_retries = 2;       // 0 = server default (3); rows with attempts >= max_retries excluded
}
message GetOutboxPendingResponse {
  repeated OutboxEntry entries = 1;
}

message UpdateOutboxEntryRequest {
  string outbox_id = 1;        // ledger_entry_id on PG
  string status = 2;
  string error = 3;
  optional int32 attempts = 4; // maps to retry_count in PG; omit to leave unchanged
}
message UpdateOutboxEntryResponse {
  bool success = 1;
  string error = 2;
}

message HasAccountingEventsForLedgerRequest {
  string ledger_entry_id = 1;
}
message HasAccountingEventsForLedgerResponse {
  bool has_events = 1;
}

message GetLedgerEntryRequest {
  string ledger_entry_id = 1;
}
// LedgerEntryData mirrors transaction_ledger columns so AccountingProcessor
// can reconstruct a dict-shaped row identical to what SQLiteStore returns.
message LedgerEntryData {
  string id = 1;
  string cycle_id = 2;
  string strategy_id = 3;         // agent_id in PG, mapped to strategy_id on the wire
  string deployment_id = 4;
  string execution_mode = 5;
  int64 timestamp = 6;            // Unix epoch seconds
  string intent_type = 7;
  string token_in = 8;
  string amount_in = 9;
  string token_out = 10;
  string amount_out = 11;
  string effective_price = 12;
  optional double slippage_bps = 13;
  int64 gas_used = 14;
  string gas_usd = 15;
  string tx_hash = 16;
  string chain = 17;
  string protocol = 18;
  bool success = 19;
  string error = 20;
  bytes extracted_data_json = 21;
  bytes price_inputs_json = 22;
  bytes pre_state_json = 23;
  bytes post_state_json = 24;
}
message GetLedgerEntryResponse {
  bool found = 1;
  LedgerEntryData entry = 2;
}

message SumLedgerGasUsdRequest {
  string deployment_id = 1;
  string strategy_id = 2;
}
message SumLedgerGasUsdResponse {
  bool success = 1;
  string gas_usd_total = 2;  // Decimal string
  string error = 3;
}

// =============================================================================
// Cutover storage messages (VIB-4208 / T22) — mirrors the 13-column
// migration_state SQLite schema in almanak/framework/state/backends/sqlite.py.
// MigrationStateRow (the framework-side dataclass) parses the bytes notes
// field back into a dict for boot-guard consumers.
// =============================================================================

message UpsertMigrationStateRequest {
  string deployment_id = 1;
  string primitive = 2;     // e.g. "lp", "perp", "lending"
  string cutover_key = 3;   // narrower scope (matches AccountingCategory.value)
}

message UpsertMigrationStateResponse {
  bool success = 1;
  string error = 2;
}

message GetMigrationStateRequest {
  string deployment_id = 1;
  string primitive = 2;
  string cutover_key = 3;
}

// Mirrors the 13 columns of the SQLite migration_state table. The Postgres
// branch raises gRPC UNIMPLEMENTED rather than returning a default-populated
// MigrationStateData. ``found=true`` distinguishes "row present" from
// "row absent, defaults zero" (same pattern as SnapshotData.found).
message MigrationStateData {
  string deployment_id = 1;
  string primitive = 2;
  string cutover_key = 3;
  bool position_registry_backfill_complete = 4;
  string backfill_started_at = 5;        // ISO-8601 UTC, "" when null
  string backfill_completed_at = 6;      // ISO-8601 UTC, "" when null
  string backfill_source_table = 7;
  int32 backfill_reader_version = 8;
  int64 rows_synthesized = 9;
  int64 rows_skipped_already_present = 10;
  bytes notes = 11;                       // JSON-encoded object
  string created_at = 12;
  string updated_at = 13;
}

message GetMigrationStateResponse {
  bool found = 1;
  MigrationStateData data = 2;
  string error = 3;
}

// Partial-update of migration_state in-flight progress columns. Only the
// supplied columns are written. Used by `BackfillReader.run()` to stamp
// `backfill_started_at` at the start and checkpoint
// `rows_synthesized` / `rows_skipped_already_present` every batch.
// `optional` fields preserve the "None means don't touch this column"
// semantics — `0` is a legitimate value for the counters.
message UpdateMigrationStateRequest {
  string deployment_id = 1;
  string primitive = 2;
  string cutover_key = 3;
  string backfill_started_at = 4;  // ISO-8601 UTC; "" => don't update
  optional int64 rows_synthesized = 5;
  optional int64 rows_skipped_already_present = 6;
}

message UpdateMigrationStateResponse {
  bool success = 1;
  string error = 2;
}

// Terminal flip — set position_registry_backfill_complete=1 with final
// counters + backfill_completed_at. Single statement so the flip is
// atomic at the SQLite-page level (cutover spec §3.3 step 4).
message MarkBackfillCompleteRequest {
  string deployment_id = 1;
  string primitive = 2;
  string cutover_key = 3;
  int64 rows_synthesized = 4;
  int64 rows_skipped_already_present = 5;
  string backfill_completed_at = 6;  // ISO-8601 UTC
}

message MarkBackfillCompleteResponse {
  bool success = 1;
  string error = 2;
}

// Streamed position_events read for the backfill loop. Filters by
// (deployment_id, position_type IN position_types) and returns rows
// ordered by (position_id ASC, timestamp ASC, id ASC). Fresh
// deployments return an empty list.
message GetPositionEventsFilteredRequest {
  string deployment_id = 1;
  repeated string position_types = 2;  // legacy position_type set (e.g. ["LP"])
}

message GetPositionEventsFilteredResponse {
  repeated PositionEventData events = 1;
  string error = 2;
}

// Position-registry open-row read (used by the runner's
// `_refresh_lp_registry_id_cache` and teardown's "what's still open?"
// query for cutover-flipped primitives). Filters mirror the
// `SQLiteStore.get_position_registry_open_rows` signature: every filter
// is optional; status='open' is always applied.
message GetPositionRegistryOpenRowsRequest {
  string deployment_id = 1;
  string chain = 2;                // "" = no filter
  string primitive = 3;            // "" = no filter
  string accounting_category = 4;  // "" = no filter
}

// One row of `position_registry`. Mirrors the 16-column schema in
// almanak/framework/state/backends/sqlite.py SCHEMA_SQL. The `payload`
// column is serialized as JSON bytes — the client adapter parses it
// back to a dict. Block / tx anchors are optional, encoded as 0 / ""
// when null. The framework adapter maps the wire shape back to the dict
// shape returned by SQLiteStore.get_position_registry_open_rows (so
// runner code is identical across local and gateway-backed runs).
message PositionRegistryRow {
  string deployment_id = 1;
  string chain = 2;
  string primitive = 3;
  string accounting_category = 4;
  string physical_identity_hash = 5;
  string semantic_grouping_key = 6;
  string grouping_policy_version = 7;
  string handle = 8;                       // "" when NULL
  string status = 9;                       // "open" | "closed" | "reorg_invalidated"
  bytes payload = 10;                      // JSON-encoded dict
  int64 opened_at_block = 11;              // 0 when NULL
  string opened_tx = 12;                   // "" when NULL
  int64 closed_at_block = 13;              // 0 when NULL
  string closed_tx = 14;                   // "" when NULL
  int64 last_reconciled_at_block = 15;     // 0 when NULL
  int32 matching_policy_version = 16;
  // Diagnostic carry-fields populated by SQLiteStore when payload JSON
  // is corrupt or non-object. Empty when payload decoded cleanly.
  // Preserves the same dict shape the local backend returns.
  string payload_raw = 17;
  string payload_decode_error = 18;
  string payload_shape_error = 19;
}

message GetPositionRegistryOpenRowsResponse {
  repeated PositionRegistryRow rows = 1;
  string error = 2;
}

// Atomic ledger + position_registry + handle commit (T11 / VIB-4197).
// The LedgerEntry fields mirror SaveLedgerEntryRequest exactly so the
// SQLite-side reconstruction can reuse the same dataclass. The
// RegistryRow + HandleMapping fields mirror the dataclasses in
// almanak/framework/accounting/commit.py.
message SaveLedgerAndRegistryRequest {
  // ---- LedgerEntry (mirrors SaveLedgerEntryRequest) ----
  string id = 1;
  string cycle_id = 2;
  string strategy_id = 3;
  string deployment_id = 4;
  string execution_mode = 5;
  int64 timestamp = 6;
  string intent_type = 7;
  string token_in = 8;
  string amount_in = 9;
  string token_out = 10;
  string amount_out = 11;
  string effective_price = 12;
  optional double slippage_bps = 13;
  int64 gas_used = 14;
  string gas_usd = 15;
  string tx_hash = 16;
  string chain = 17;
  string protocol = 18;
  bool success = 19;
  string error = 20;
  bytes extracted_data_json = 21;
  bytes price_inputs_json = 22;
  bytes pre_state_json = 23;
  bytes post_state_json = 24;
  // ---- RegistryRow ----
  string registry_chain = 50;                       // intentional gap so adding ledger fields stays contiguous
  string registry_primitive = 51;
  string registry_accounting_category = 52;
  string registry_physical_identity_hash = 53;
  string registry_semantic_grouping_key = 54;
  string registry_grouping_policy_version = 55;
  string registry_handle = 56;                      // "" when None
  string registry_status = 57;                      // "open" | "closed" | "reorg_invalidated"
  bytes registry_payload_json = 58;                 // JSON-encoded dict
  int32 registry_matching_policy_version = 59;
  optional int64 registry_opened_at_block = 60;
  string registry_opened_tx = 61;                   // "" when None
  optional int64 registry_closed_at_block = 62;
  string registry_closed_tx = 63;                   // "" when None
  optional int64 registry_last_reconciled_at_block = 64;
  // ---- HandleMapping (optional — populated when ``handle != ""``) ----
  string handle_mapping_handle = 80;                // "" => no HandleMapping
  string handle_mapping_deployment_id = 81;
  string handle_mapping_accounting_category = 82;
  // Commit mode (T24 / VIB-4210 / VIB-4221 ADR §8.1 — ratified Option (c)).
  // ``""`` (proto3 default) and ``"commit"`` (explicit) are SEMANTICALLY
  // IDENTICAL — both run the T11/T19 atomic three-write contract:
  //   1) INSERT into transaction_ledger
  //   2) UPSERT into position_registry
  //   3) Handle backfill UPDATE
  // ``"registry_reconciliation"`` flips the writer into reconciliation
  // mode and SKIPS step (1) — only the registry UPSERT + handle backfill
  // run, atomically. Used exclusively by ``PositionService.Reconcile``
  // when ``apply=true``. Reconciliation discovers chain-only positions
  // (the GH #2131 phantom-missing case) — there is no corresponding
  // strategy intent, so writing a synthesized ledger row would pollute
  // the immutable intent history. The ledger MUST NOT be touched on
  // this path (ADR §2.3 #1+#2). Backward compatibility: existing callers
  // do not set this field; proto3 default ("") routes to the original
  // three-write path bit-identically.
  string mode = 100;
}

message SaveLedgerAndRegistryResponse {
  bool success = 1;
  string error = 2;
  // Error-discriminator: lets the client adapter distinguish a
  // RegistryAutoCollisionError (the strategy author forgot a
  // registry_handle on a multi-NFT-per-pool deployment — programming
  // bug, NOT an infrastructure failure) from a generic persistence
  // failure. VIB-4200 / PRD §"Loud Failure, Not Confusing Failure"
  // requires that collision class to propagate as a distinct exception
  // mode-uniformly. Empty string when ``success=true`` or on a generic
  // failure.
  string error_class = 3;
}

// =============================================================================
// ExecutionService - handles intent compilation and transaction execution
// =============================================================================

service ExecutionService {
  // Compile an intent into an action bundle.
  rpc CompileIntent(CompileIntentRequest) returns (CompilationResult);

  // Execute an action bundle (sign, submit, confirm).
  rpc Execute(ExecuteRequest) returns (ExecutionResult);

  // Get status of a submitted transaction.
  rpc GetTransactionStatus(TxStatusRequest) returns (TxStatus);
}

message CompileIntentRequest {
  string intent_type = 1;  // Case-insensitive with aliases: "swap"/"SWAP", "lp_open"/"lpopen", "lp_close"/"lpclose", "perp_open"/"perpopen", etc.
  bytes intent_data = 2;  // JSON-serialized intent
  string chain = 3;
  string wallet_address = 4;
  map<string, string> price_map = 5;  // Token symbol -> USD price string (preserves Decimal precision). Empty = use placeholder prices.
}

message CompilationResult {
  bool success = 1;
  bytes action_bundle = 2;  // JSON-serialized ActionBundle
  string error = 3;
  string error_code = 4;  // Structured error code
}

message ExecuteRequest {
  bytes action_bundle = 1;  // JSON-serialized ActionBundle
  bool dry_run = 2;  // Simulate only, don't submit
  bool simulation_enabled = 3;  // Run simulation before execution
  string strategy_id = 4;
  string intent_id = 5;
  string chain = 6;
  string wallet_address = 7;
  int32 max_gas_price_gwei = 8;  // Gas price cap in gwei (0 = use gateway default)
}

message ExecutionResult {
  bool success = 1;
  repeated string tx_hashes = 2;
  int64 total_gas_used = 3;
  bytes receipts = 4;  // JSON-serialized list of receipts
  string error = 5;
  string error_code = 6;
  string execution_id = 7;
}

message TxStatusRequest {
  string tx_hash = 1;
  string chain = 2;
}

message TxStatus {
  string status = 1;  // "pending", "confirmed", "failed", "reverted"
  int64 confirmations = 2;
  int64 block_number = 3;
  int64 gas_used = 4;
  string error = 5;
}

// =============================================================================
// ObserveService - logging, alerting, and metrics
// =============================================================================

service ObserveService {
  // Log a message from the strategy.
  rpc Log(LogEntry) returns (Empty);

  // Send an alert through configured channels.
  rpc Alert(AlertRequest) returns (AlertResponse);

  // Record a metric value.
  rpc RecordMetric(MetricEntry) returns (Empty);

  // Record a timeline event for a strategy.
  rpc RecordTimelineEvent(RecordTimelineEventRequest) returns (RecordTimelineEventResponse);
}

message LogEntry {
  string level = 1;  // "DEBUG", "INFO", "WARNING", "ERROR"
  string message = 2;
  string strategy_id = 3;
  map<string, string> context = 4;
  int64 timestamp = 5;
  string logger_name = 6;
}

message AlertRequest {
  string channel = 1;  // "slack", "telegram"
  string message = 2;
  string severity = 3;  // "info", "warning", "critical"
  string strategy_id = 4;
  map<string, string> metadata = 5;
}

message AlertResponse {
  bool success = 1;
  string error = 2;
  string alert_id = 3;
}

message MetricEntry {
  string name = 1;
  double value = 2;
  map<string, string> labels = 3;
  int64 timestamp = 4;
  string metric_type = 5;  // "gauge", "counter", "histogram"
}

message RecordTimelineEventRequest {
  string strategy_id = 1;
  string event_type = 2;       // "TRADE", "REBALANCE", "ERROR", "STATE_CHANGE", etc.
  string description = 3;
  string tx_hash = 4;          // Optional: transaction hash
  string chain = 5;            // Optional: chain name
  string details_json = 6;     // Optional: JSON-encoded details
  int64 timestamp = 7;         // Optional: event timestamp (uses server time if 0)
  string cycle_id = 8;         // Optional: correlation ID linking events in one decide->execute cycle
  string phase = 9;            // Optional: strategy lifecycle phase (DECIDE, COMPILE, VALIDATE, EXECUTE, ENRICH)
  string related_ledger_entry_id = 10;  // Optional: typed pointer to transaction_ledger.id (VIB-4041). Use for tx-correlated UX events (POSITION_OPENED, etc.). Money trail lives in the ledger row, not in details_json.
}

message RecordTimelineEventResponse {
  bool success = 1;
  string event_id = 2;         // Assigned event ID
  string error = 3;
}

// =============================================================================
// RpcService - JSON-RPC proxy for blockchain access (Phase 3)
// =============================================================================

service RpcService {
  // Make a single JSON-RPC call to a chain.
  rpc Call(RpcRequest) returns (RpcResponse);

  // Make a batch of JSON-RPC calls to a chain.
  rpc BatchCall(RpcBatchRequest) returns (RpcBatchResponse);

  // Query ERC-20 allowance for a token/owner/spender.
  rpc QueryAllowance(AllowanceRequest) returns (AllowanceResponse);

  // Query ERC-20 balance for a token/wallet.
  rpc QueryBalance(BalanceQueryRequest) returns (BalanceQueryResponse);

  // Query Uniswap V3 position liquidity.
  rpc QueryPositionLiquidity(PositionLiquidityRequest) returns (PositionLiquidityResponse);

  // Query Uniswap V3 position tokens owed (fees + withdrawn liquidity).
  rpc QueryPositionTokensOwed(PositionTokensOwedRequest) returns (PositionTokensOwedResponse);
}

message RpcRequest {
  string chain = 1;           // Chain identifier (e.g., "arbitrum", "base", "ethereum")
  string method = 2;          // JSON-RPC method (e.g., "eth_call", "eth_getBalance")
  string params = 3;          // JSON-encoded params array
  string id = 4;              // Request ID for correlation
  string network = 5;         // Optional network override ("mainnet", "anvil"). If empty, uses gateway default.
}

message RpcResponse {
  string result = 1;          // JSON-encoded result
  string error = 2;           // JSON-encoded error object if failed
  string id = 3;              // Request ID for correlation
  bool success = 4;
}

message RpcBatchRequest {
  string chain = 1;
  repeated RpcRequest requests = 2;
}

message RpcBatchResponse {
  repeated RpcResponse responses = 1;
}

// Typed RPC query messages for common operations
message AllowanceRequest {
  string chain = 1;               // Chain identifier
  string token_address = 2;       // ERC-20 token contract address
  string owner_address = 3;       // Token owner address
  string spender_address = 4;     // Spender address
}

message AllowanceResponse {
  bool success = 1;
  string allowance = 2;           // Allowance as decimal string (wei)
  string error = 3;
}

message BalanceQueryRequest {
  string chain = 1;               // Chain identifier
  string token_address = 2;       // ERC-20 token contract address
  string wallet_address = 3;      // Wallet to query balance for
}

message BalanceQueryResponse {
  bool success = 1;
  string balance = 2;             // Balance as decimal string (wei)
  string error = 3;
}

message PositionLiquidityRequest {
  string chain = 1;               // Chain identifier
  string position_manager = 2;    // NFT Position Manager address
  uint64 token_id = 3;            // Position NFT token ID
}

message PositionLiquidityResponse {
  bool success = 1;
  string liquidity = 2;           // Liquidity as decimal string
  string error = 3;
}

message PositionTokensOwedRequest {
  string chain = 1;               // Chain identifier
  string position_manager = 2;    // NFT Position Manager address
  uint64 token_id = 3;            // Position NFT token ID
}

message PositionTokensOwedResponse {
  bool success = 1;
  string tokens_owed0 = 2;        // tokensOwed0 as decimal string (wei)
  string tokens_owed1 = 3;        // tokensOwed1 as decimal string (wei)
  string error = 4;
}

// =============================================================================
// IntegrationService - third-party data sources (Phase 3)
// =============================================================================

service IntegrationService {
  // Binance market data endpoints
  rpc BinanceGetTicker(BinanceTickerRequest) returns (BinanceTickerResponse);
  rpc BinanceGetKlines(BinanceKlinesRequest) returns (BinanceKlinesResponse);
  rpc BinanceGetOrderBook(BinanceOrderBookRequest) returns (BinanceOrderBookResponse);

  // CoinGecko price and market data endpoints
  rpc CoinGeckoGetPrice(CoinGeckoGetPriceRequest) returns (CoinGeckoGetPriceResponse);
  rpc CoinGeckoGetPrices(CoinGeckoGetPricesRequest) returns (CoinGeckoGetPricesResponse);
  rpc CoinGeckoGetMarkets(CoinGeckoGetMarketsRequest) returns (CoinGeckoGetMarketsResponse);
  rpc CoinGeckoGetHistoricalPrice(CoinGeckoHistoricalPriceRequest) returns (CoinGeckoHistoricalPriceResponse);
  rpc CoinGeckoGetMarketChartRange(CoinGeckoMarketChartRangeRequest) returns (CoinGeckoMarketChartRangeResponse);

  // TheGraph subgraph query endpoint
  rpc TheGraphQuery(TheGraphQueryRequest) returns (TheGraphQueryResponse);

  // GeckoTerminal DEX OHLCV endpoint (proxy for deployed strategies without internet)
  rpc GeckoTerminalGetOHLCV(GeckoTerminalOHLCVRequest) returns (GeckoTerminalOHLCVResponse);

  // External portfolio APIs (Zerion, future providers)
  rpc GetWalletPortfolio(WalletPortfolioRequest) returns (WalletPortfolioResponse);
  rpc GetWalletPositions(WalletPortfolioRequest) returns (WalletPortfolioResponse);
}

// =============================================================================
// Binance Integration Messages
// =============================================================================

message BinanceTickerRequest {
  string symbol = 1;          // Trading pair (e.g., "BTCUSDT", "ETHUSDT")
}

message BinanceTickerResponse {
  string symbol = 1;
  string price = 2;           // Last price as string
  string price_change = 3;    // 24h price change
  string price_change_percent = 4;  // 24h price change percent
  string high_24h = 5;
  string low_24h = 6;
  string volume_24h = 7;      // Base asset volume
  string quote_volume_24h = 8; // Quote asset volume
  int64 timestamp = 9;
}

message BinanceKlinesRequest {
  string symbol = 1;          // Trading pair
  string interval = 2;        // Kline interval (1m, 5m, 15m, 1h, 4h, 1d, etc.)
  int32 limit = 3;            // Number of klines (max 1000)
  int64 start_time = 4;       // Start timestamp in ms (optional)
  int64 end_time = 5;         // End timestamp in ms (optional)
}

message BinanceKline {
  int64 open_time = 1;
  string open = 2;
  string high = 3;
  string low = 4;
  string close = 5;
  string volume = 6;
  int64 close_time = 7;
  string quote_volume = 8;
  int32 trades = 9;
}

message BinanceKlinesResponse {
  repeated BinanceKline klines = 1;
}

message BinanceOrderBookRequest {
  string symbol = 1;
  int32 limit = 2;            // Depth limit (5, 10, 20, 50, 100, 500, 1000)
}

message BinanceOrderBookEntry {
  string price = 1;
  string quantity = 2;
}

message BinanceOrderBookResponse {
  int64 last_update_id = 1;
  repeated BinanceOrderBookEntry bids = 2;
  repeated BinanceOrderBookEntry asks = 3;
}

// =============================================================================
// CoinGecko Integration Messages
// =============================================================================

message CoinGeckoGetPriceRequest {
  string token_id = 1;        // CoinGecko token ID (e.g., "ethereum", "bitcoin")
  repeated string vs_currencies = 2;  // Quote currencies (e.g., ["usd", "eur"])
}

message CoinGeckoGetPriceResponse {
  map<string, string> prices = 1;  // currency -> price as string
  int64 timestamp = 2;
}

message CoinGeckoGetPricesRequest {
  repeated string token_ids = 1;
  repeated string vs_currencies = 2;
}

message CoinGeckoTokenPrice {
  string token_id = 1;
  map<string, string> prices = 2;
}

message CoinGeckoGetPricesResponse {
  repeated CoinGeckoTokenPrice tokens = 1;
  int64 timestamp = 2;
}

message CoinGeckoGetMarketsRequest {
  string vs_currency = 1;     // Quote currency (e.g., "usd")
  repeated string ids = 2;    // Token IDs to filter (optional)
  string order = 3;           // Sort order (market_cap_desc, volume_desc, etc.)
  int32 per_page = 4;         // Results per page (max 250)
  int32 page = 5;             // Page number
}

message CoinGeckoMarket {
  string id = 1;
  string symbol = 2;
  string name = 3;
  string current_price = 4;
  string market_cap = 5;
  int32 market_cap_rank = 6;
  string total_volume = 7;
  string high_24h = 8;
  string low_24h = 9;
  string price_change_24h = 10;
  string price_change_percentage_24h = 11;
  int64 last_updated = 12;
}

message CoinGeckoGetMarketsResponse {
  repeated CoinGeckoMarket markets = 1;
}

message CoinGeckoHistoricalPriceRequest {
  string token_id = 1;        // CoinGecko token ID (e.g., "ethereum", "bitcoin")
  string date = 2;            // Date in dd-mm-yyyy format
}

message CoinGeckoHistoricalPriceResponse {
  string price_usd = 1;       // Price in USD as string
  string market_cap_usd = 2;  // Market cap in USD as string
  string volume_usd = 3;      // 24h volume in USD as string
  int64 timestamp = 4;
  bool success = 5;
  string error = 6;
}

message CoinGeckoMarketChartRangeRequest {
  string token_id = 1;        // CoinGecko token ID
  int64 from_timestamp = 2;   // Start timestamp in seconds
  int64 to_timestamp = 3;     // End timestamp in seconds
  string vs_currency = 4;     // Quote currency (default: "usd")
}

message CoinGeckoMarketChartDataPoint {
